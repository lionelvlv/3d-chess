<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=IBM+Plex+Mono:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/landing.css">
  <link rel="stylesheet" href="css/overlay.css">
  <link rel="stylesheet" href="css/effects.css">

  <!-- Critical inline fallback — ensures layout works even if external CSS is blocked.
       Edge's Tracking Prevention on file:// can block loading local CSS files.
       NO !important on #landing — JS must be able to hide it (ui.landing.style.display='none'). -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#09090e; --surface:#111118; --border:rgba(232,228,220,.1);
      --border-active:rgba(232,228,220,.25); --text:#e8e4dc; --text-dim:rgba(232,228,220,.4);
      --accent:#4a7fa5; --accent-bright:#6aa3cc; --warm:#c8b8a2;
      --sp-1:.5rem; --sp-2:.75rem; --sp-3:1rem; --sp-4:1.5rem;
      --sp-5:2rem; --sp-6:3rem;
      --r-sm:4px; --r-md:8px;
      --ease:140ms ease;
      --font-display:'Syne',sans-serif;
      --font-mono:'IBM Plex Mono',monospace;
      --font-body:'DM Sans',sans-serif;
    }
    body { background:#09090e; color:#e8e4dc; font-family:'DM Sans',sans-serif; }

    /* Landing */
    #landing { display:flex; position:fixed; inset:0; z-index:100;
               background:#09090e; flex-direction:column;
               align-items:center; justify-content:center;
               padding:1.5rem; gap:3rem; }

    /* Menu */
    .menu { display:flex; flex-direction:column; gap:.75rem;
            align-items:stretch; width:min(280px,86vw); }
    .brand { text-align:center; }
    .brand-title { font-family:'Syne',sans-serif; font-size:clamp(4rem,14vw,9rem);
                   font-weight:800; color:#e8e4dc; line-height:1;
                   padding-top:1rem; border-top:1px solid rgba(232,228,220,.25); }
    .brand-sub { font-family:'IBM Plex Mono',monospace; font-size:clamp(.55rem,1.4vw,.7rem);
                 letter-spacing:.42em; text-transform:uppercase; color:#c8b8a2;
                 margin-top:.75rem; padding-bottom:1rem; border-bottom:1px solid rgba(232,228,220,.1); }

    /* Buttons */
    .btn { font-family:'IBM Plex Mono',monospace; font-size:.65rem; font-weight:700;
           letter-spacing:.12em; text-transform:uppercase; width:100%; padding:13px 1.5rem;
           cursor:pointer; border-radius:4px; border:1px solid rgba(232,228,220,.25);
           background:transparent; color:#e8e4dc; transition:background 140ms ease;
           line-height:1.5; text-align:center; }
    .btn:hover { background:rgba(232,228,220,.06); }
    .btn-primary,.btn-o { background:#4a7fa5; border-color:#4a7fa5; color:#fff; }
    .btn-g { border-color:rgba(74,127,165,.45); color:#6aa3cc; }

    /* Expand rows */
    .expand-row { display:none; flex-direction:column; align-items:stretch;
                  gap:.75rem; padding:1rem; border:1px solid rgba(232,228,220,.1);
                  border-top:none; border-radius:0 0 8px 8px;
                  background:#111118; width:100%; }
    .expand-row.open { display:flex; }

    /* Option buttons */
    .obtn { font-family:'IBM Plex Mono',monospace; font-size:.5rem; font-weight:700;
            letter-spacing:.16em; text-transform:uppercase; flex:1; padding:8px 4px;
            cursor:pointer; border-radius:4px; border:1px solid rgba(232,228,220,.15);
            background:transparent; color:rgba(232,228,220,.5);
            transition:background 140ms ease, color 140ms ease; }
    .obtn.active { background:rgba(74,127,165,.18); color:#6aa3cc;
                   border-color:rgba(74,127,165,.45); }
    .obtn.de.active { color:#4a9a7a; border-color:rgba(74,154,122,.4);
                      background:rgba(74,154,122,.1); }
    .obtn.dm.active { color:#c8b060; border-color:rgba(200,176,96,.4);
                      background:rgba(200,176,96,.1); }
    .obtn.dh.active { color:#c0444c; border-color:rgba(192,68,76,.4);
                      background:rgba(192,68,76,.1); }
    .opt-row { display:flex; gap:.5rem; width:100%; }
    .row-label { font-family:'IBM Plex Mono',monospace; font-size:.5rem;
                 letter-spacing:.28em; text-transform:uppercase;
                 color:rgba(232,228,220,.4); margin-top:.5rem; }

    /* HUD / Overlays */
    #hud      { display:none; position:fixed; inset:0; z-index:50; pointer-events:none; }
    #hud.on   { display:block; }
    #gameover { display:none; position:fixed; inset:0; z-index:300;
                align-items:center; justify-content:center;
                background:rgba(9,9,14,.9); }
    #gameover.on { display:flex; }
    #online-overlay { display:none; position:fixed; inset:0; z-index:200;
                      align-items:center; justify-content:center;
                      background:rgba(9,9,14,.92); }
    #online-overlay.on { display:flex; }
    #setup-overlay { display:none; }
    #setup-overlay.on { display:flex; position:fixed; inset:0; z-index:80;
                        flex-direction:column; pointer-events:none;
                        /* NO background — 3D board must show through */ }
    #promo { display:none; position:fixed; inset:0; z-index:400;
             align-items:center; justify-content:center; background:rgba(9,9,14,.9); }
    #promo.on { display:flex; }
    #chkflash { display:none; }
    #chkflash.on { display:block; }

    /* Game over box — must be self-contained so it centers even without overlay.css */
    .go-box { display:flex; flex-direction:column; align-items:center; text-align:center;
              padding:3rem; background:#111118; border:1px solid rgba(232,228,220,.25);
              border-radius:8px; box-shadow:0 8px 48px rgba(0,0,0,.6);
              width:min(88vw,360px); isolation:isolate; }
    .go-title { font-family:'Syne',sans-serif; font-size:clamp(1.8rem,6vw,2.4rem);
                font-weight:800; color:#e8e4dc; letter-spacing:.06em;
                margin-bottom:.75rem; text-align:center; width:100%; }
    .go-sub   { font-family:'IBM Plex Mono',monospace; font-size:.56rem;
                letter-spacing:.22em; color:rgba(232,228,220,.4);
                margin-bottom:2rem; text-transform:uppercase; line-height:2;
                text-align:center; width:100%; }
    .go-btns  { display:flex; flex-direction:column; gap:.75rem; width:100%; }
    .go-btns .btn { width:100%; min-width:unset; text-align:center; }

    /* Online overlay box */
    .op-box { display:flex; flex-direction:column; align-items:center; gap:1rem;
              padding:2.5rem; background:#111118; border:1px solid rgba(232,228,220,.25);
              border-radius:8px; width:min(90vw,380px); text-align:center; }
    .op-title { font-family:'Syne',sans-serif; font-size:1.4rem; font-weight:800;
                color:#e8e4dc; letter-spacing:.04em; }
    .op-hint  { font-family:'IBM Plex Mono',monospace; font-size:.5rem;
                color:rgba(232,228,220,.4); letter-spacing:.15em; text-transform:uppercase; }
    .op-btns  { display:flex; flex-direction:column; gap:.5rem; width:100%; }
    .op-status { font-family:'IBM Plex Mono',monospace; font-size:.52rem;
                 letter-spacing:.12em; color:rgba(232,228,220,.5); }
    .op-status.ok  { color:#4a9a7a; }
    .op-status.err { color:#c0444c; }
    .room-code { font-family:'Syne',sans-serif; font-size:2.8rem; font-weight:800;
                 color:#e8e4dc; letter-spacing:.2em; cursor:pointer; }
    .op-input { font-family:'IBM Plex Mono',monospace; font-size:1.2rem; font-weight:700;
                letter-spacing:.3em; text-align:center; text-transform:uppercase;
                padding:.75rem 1rem; background:#09090e; color:#e8e4dc;
                border:1px solid rgba(232,228,220,.25); border-radius:4px; width:100%; }

    /* HUD elements */
    .hud-bl { position:absolute; bottom:1.5rem; left:1.5rem;
              display:flex; flex-direction:column; gap:.5rem; pointer-events:all; }
    .hud-br { position:absolute; bottom:1.5rem; right:1.5rem;
              display:flex; flex-direction:column; align-items:flex-end;
              gap:.5rem; pointer-events:all; }
    .hud-top { position:absolute; top:1.5rem; left:50%; transform:translateX(-50%);
               display:flex; flex-direction:column; align-items:center; gap:.25rem;
               pointer-events:none; }
    .turn-pill { font-family:'IBM Plex Mono',monospace; font-size:.55rem; font-weight:700;
                 letter-spacing:.2em; text-transform:uppercase; color:#e8e4dc;
                 background:rgba(9,9,14,.82); border:1px solid rgba(232,228,220,.2);
                 border-radius:20px; padding:.4rem 1.2rem; }
    .btn-sm { font-family:'IBM Plex Mono',monospace; font-size:.55rem; font-weight:700;
              letter-spacing:.12em; text-transform:uppercase; padding:9px 1rem;
              border-radius:4px; border:1px solid rgba(232,228,220,.2);
              background:rgba(9,9,14,.8); color:#e8e4dc; cursor:pointer;
              pointer-events:all; }
    .info-tag { font-family:'IBM Plex Mono',monospace; font-size:.48rem;
                letter-spacing:.16em; text-transform:uppercase;
                color:rgba(232,228,220,.45); }
    .clock-box { position:fixed; top:1.5rem; pointer-events:none; }
    .clock-box.left { left:1.5rem; }
    .clock-box.right { right:1.5rem; }
    .ctime { font-family:'IBM Plex Mono',monospace; font-size:1.8rem; font-weight:700;
             color:#e8e4dc; }
    .clock-lbl { font-family:'IBM Plex Mono',monospace; font-size:.42rem;
                 letter-spacing:.2em; text-transform:uppercase;
                 color:rgba(232,228,220,.4); }

    /* Custom time input */
    #custom-time-row { display:none; align-items:center; gap:.5rem; }
    #custom-time-row.visible { display:flex; }
    .time-input { background:#09090e; border:1px solid rgba(232,228,220,.2);
                  color:#e8e4dc; border-radius:4px; padding:4px 8px;
                  font-family:'IBM Plex Mono',monospace; font-size:.6rem; width:60px; }
  </style>
</head>
<body>

<canvas id="c"></canvas>
<div id="chkflash"></div>
<!-- Cat button — tiny easter egg, bottom right -->
<div id="btn-cat-wrap">
  <button id="btn-cat" title="🐱">🐱</button>
</div>

<!-- ════════════════════════════════════════════
     LANDING
════════════════════════════════════════════ -->
<div id="landing">

  <div class="brand">
    <div class="brand-title">CHESS</div>
    <div class="brand-sub">Arcade</div>
  </div>

  <div class="menu" id="main-menu">

    <!-- ── Play vs AI ── -->
    <button class="btn btn-primary" id="btn-ai">Play vs AI</button>
    <div class="expand-row" id="row-ai">

      <div class="row-label" style="margin-top:4px">Theme</div>
      <div class="opt-row">
        <button class="obtn theme-chip active" data-theme="classic">Classic</button>
        <button class="obtn theme-chip"        data-theme="marble">Marble</button>
        <button class="obtn theme-chip"        data-theme="neon">Neon</button>
      </div>

      <div class="row-label" style="margin-top:4px">Engine</div>
      <div class="opt-row">
        <button class="obtn active" id="btn-engine-sf"  data-engine="sf">Stockfish</button>
        <button class="obtn"        id="btn-engine-mm"  data-engine="mm">Minimax</button>
      </div>

      <div class="row-label" style="margin-top:4px">Difficulty</div>
      <div class="opt-row">
        <button class="obtn de active" data-d="1">Easy</button>
        <button class="obtn dm"        data-d="2">Med</button>
        <button class="obtn dh"        data-d="3">Hard</button>
      </div>

      <div class="row-label" style="margin-top:4px">Side</div>
      <div class="opt-row">
        <button class="obtn" data-c="w">White</button>
        <button class="obtn" data-c="r">Random</button>
        <button class="obtn" data-c="b">Black</button>
      </div>

      <div class="row-label" style="margin-top:4px">Clock</div>
      <div class="opt-row">
        <button class="obtn active tc" data-t="0">Off</button>
        <button class="obtn        tc" data-t="300">5m</button>
        <button class="obtn        tc" data-t="600">10m</button>
        <button class="obtn        tc" data-t="900">15m</button>
        <button class="obtn        tc" data-t="-1">Custom</button>
      </div>
      <div id="custom-time-row">
        <input type="number" id="custom-mins" class="time-input"
               min="1" max="99" value="5" aria-label="Custom minutes">
        <span class="row-label" style="margin-top:0">min</span>
      </div>

      <div style="margin-top:var(--sp-2);width:100%">
        <button class="btn" id="btn-setup-ai" style="border-color:rgba(200,184,162,.3);color:var(--warm);padding:9px var(--sp-3)">Custom Setup →</button>
      </div>

    </div>

    <!-- ── Online 1v1 ── -->
    <button class="btn btn-g" id="btn-online">Online 1v1</button>
    <div class="expand-row" id="row-online">

      <button class="btn" id="op-create-btn" style="margin:0">Create Room</button>
      <button class="btn" id="op-create-setup-btn" style="margin:0;border-color:rgba(200,184,162,.35);color:var(--warm)">Create Room — Custom Setup</button>
      <button class="btn" id="op-join-btn"  style="margin:0">Join Room</button>

      <div class="row-label" style="margin-top:4px">Clock</div>
      <div class="opt-row">
        <button class="obtn active tc-online" data-t="0">Off</button>
        <button class="obtn        tc-online" data-t="300">5m</button>
        <button class="obtn        tc-online" data-t="600">10m</button>
        <button class="obtn        tc-online" data-t="900">15m</button>
      </div>

    </div>

  </div>

</div>


<!-- ════════════════════════════════════════════
     ONLINE OVERLAY — waiting + joining panels only
     (menu options now live in landing expand-row)
════════════════════════════════════════════ -->
<div id="online-overlay">

  <div id="op-waiting" class="op-box" style="display:none">
    <div class="op-title">Room Code</div>
    <div class="op-hint">Share this with your opponent</div>
    <div class="room-code" id="op-code" title="Tap to copy code">????</div>
    <div class="op-status" id="op-wait-status"><span class="spinner">↻</span> Waiting...</div>
    <div class="invite-link-row">
      <div class="invite-link-display" id="op-invite-url">—</div>
      <button class="btn-copy-link" id="op-copy-link">⎘ Copy Link</button>
    </div>
    <div class="row-label" style="margin:.6rem 0 .3rem">Clock</div>
    <div class="opt-row" style="justify-content:center;gap:4px">
      <button class="obtn active tc-online" data-t="0">Off</button>
      <button class="obtn        tc-online" data-t="300">5m</button>
      <button class="obtn        tc-online" data-t="600">10m</button>
      <button class="obtn        tc-online" data-t="900">15m</button>
    </div>
    <div class="op-btns" style="margin-top:12px">
      <button class="btn" id="op-cancel-wait">Cancel</button>
    </div>
  </div>

  <div id="op-joining" class="op-box" style="display:none">
    <div class="op-title">Join Room</div>
    <div class="op-hint">Enter your friend's code</div>
    <input class="op-input" id="op-code-input"
           maxlength="4" placeholder="ABCD"
           autocomplete="off" spellcheck="false">
    <div class="op-status" id="op-join-status">&nbsp;</div>
    <div class="op-btns" style="margin-top:8px">
      <button class="btn btn-g" id="op-connect-btn">Connect</button>
      <button class="btn"       id="op-cancel-join">← Back</button>
    </div>
  </div>

</div>


<!-- ════════════════════════════════════════════
     HUD — in-game overlay
════════════════════════════════════════════ -->
<div id="hud">

  <div class="clock-box left" id="clock-w">
    <div class="clock-lbl">White</div>
    <div class="ctime" id="timer-w">--:--</div>
  </div>
  <div class="clock-box right" id="clock-b">
    <div class="clock-lbl">Black</div>
    <div class="ctime" id="timer-b">--:--</div>
  </div>

  <div class="hud-top">
    <div class="turn-pill" id="turn-pill">White's Turn</div>
    <div class="status-txt" id="status-txt">CHECK!</div>
    <div class="sel-label"  id="sel-label"></div>
  </div>

  <div class="hud-bl">
    <button class="btn-sm" id="btn-new">← Menu</button>
    <button class="btn-sm" id="btn-history">History</button>
    <!-- Collapsible move history panel -->
    <div id="history-panel">
      <div id="history-header">Moves <button id="history-copy-btn" title="Copy to clipboard">⎘ Copy</button></div>
      <div id="history-list"></div>
    </div>
  </div>

  <div class="hud-br">
    <div class="info-tag" id="mode-tag">VS AI</div>
    <div class="info-tag" id="sf-tag" style="display:none"></div>
    <div class="cap-tray" id="cap-tray"></div>
  </div>

</div>


<!-- ════════════════════════════════════════════
     GAME OVER
════════════════════════════════════════════ -->
<div id="gameover">
  <div class="go-box">
    <div class="go-title" id="go-title">Checkmate</div>
    <div class="go-sub"   id="go-sub">White wins</div>
    <div class="go-btns">
      <button class="btn btn-o" id="btn-again">Play Again</button>
      <button class="btn"       id="btn-menu" >Main Menu</button>
    </div>
  </div>
</div>


<!-- ════════════════════════════════════════════
     PAWN PROMOTION
════════════════════════════════════════════ -->
<div id="promo">
  <div class="promo-box">
    <div class="promo-lbl">Promote Pawn</div>
    <div class="promo-btns">
      <button class="pbtn" data-p="q">♛</button>
      <button class="pbtn" data-p="r">♜</button>
      <button class="pbtn" data-p="b">♝</button>
      <button class="pbtn" data-p="n">♞</button>
    </div>
  </div>
</div>


<!-- ════════════════════════════════════════════
     SETUP MODE — pre-game board editor
════════════════════════════════════════════ -->
<div id="setup-overlay">

  <!-- Top bar -->
  <div id="setup-bar">
    <span id="setup-bar-label">Setup Board</span>
    <span id="setup-status">Place pieces, then start</span>
  </div>

  <!-- Ghost cursor that follows pointer while holding a piece -->
  <div id="setup-cursor"></div>

  <!-- Bottom palette tray -->
  <div id="setup-palette">

    <div class="palette-row">
      <span class="palette-label">White</span>
      <button class="pchip" data-piece="k" data-color="w" title="King">♔</button>
      <button class="pchip" data-piece="q" data-color="w" title="Queen">♕</button>
      <button class="pchip" data-piece="r" data-color="w" title="Rook">♖</button>
      <button class="pchip" data-piece="b" data-color="w" title="Bishop">♗</button>
      <button class="pchip" data-piece="n" data-color="w" title="Knight">♘</button>
      <button class="pchip" data-piece="p" data-color="w" title="Pawn">♙</button>
    </div>

    <div class="palette-row">
      <span class="palette-label">Black</span>
      <button class="pchip" data-piece="k" data-color="b" title="King">♚</button>
      <button class="pchip" data-piece="q" data-color="b" title="Queen">♛</button>
      <button class="pchip" data-piece="r" data-color="b" title="Rook">♜</button>
      <button class="pchip" data-piece="b" data-color="b" title="Bishop">♝</button>
      <button class="pchip" data-piece="n" data-color="b" title="Knight">♞</button>
      <button class="pchip" data-piece="p" data-color="b" title="Pawn">♟</button>
    </div>

    <div class="palette-row" style="margin-top:2px">
      <span class="palette-label"></span>
      <button class="pchip erase" id="setup-erase" title="Erase">✕</button>
      <button class="pchip" id="setup-clear-btn" title="Clear board" style="font-size:.5rem;letter-spacing:.04em;font-family:var(--font-mono);color:var(--text-dim);width:auto;padding:0 10px">Clear</button>
      <button class="pchip" id="setup-reset-btn" title="Reset to standard" style="font-size:.5rem;letter-spacing:.04em;font-family:var(--font-mono);color:var(--text-dim);width:auto;padding:0 10px">Reset</button>
    </div>

    <div id="setup-actions">
      <button class="btn" id="setup-cancel-btn">← Back</button>
      <button class="btn btn-primary" id="setup-start-btn">Start Game</button>
    </div>

  </div>
</div>


<!-- Three.js r128 + OrbitControls -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<!-- PeerJS loaded lazily in networking.js when a room is created/joined -->

<!-- Game modules — order matters, each builds on the previous -->
<script src="js/engine.js"></script>
<script src="js/ai.js"></script>
<script src="js/audio.js"></script>
<script src="js/scene.js"></script>
<script src="js/pieces.js"></script>
<script src="js/highlights.js"></script>
<script src="js/particles.js"></script>
<script src="js/raycasting.js"></script>
<script src="js/networking.js"></script>
<script src="js/timer.js"></script>
<script src="js/game.js"></script>
<script src="js/setup.js"></script>
<script src="js/history.js"></script>
<script src="js/ghost.js"></script>
<script src="js/invite.js"></script>
<script src="js/cats.js"></script>
<script src="js/events.js"></script>
<script src="js/main.js"></script>

</body>
</html>
