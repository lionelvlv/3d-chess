  selRingMesh = new THREE.Mesh(selRingGeo, selRingMat);
  const { x, z } = boardToWorld(r, f);
  selRingMesh.position.set(x, .09, z);
  selRingMesh.rotation.x = Math.PI/2;
  selRingMesh.renderOrder = 9;
  selRingTime = 0;
  scene.add(selRingMesh);
}

function removeSelectionRing() {
  if (selRingMesh) { scene.remove(selRingMesh); selRingMesh = null; }
}

function tickSelectionRing() {
  if (!selRingMesh) return;
  selRingTime += .055;
  selRingMat.color.setHSL(selRingTime * .09 % 1, 1, .65);
  selRingMat.opacity = .65 + Math.sin(selRingTime * 3) * .3;
  selRingMesh.rotation.y += .04;
  selRingMesh.scale.setScalar(1 + Math.sin(selRingTime * 5) * .04);
}


// ═══════════════════════════════════════════
//  7. PARTICLES — bursts, dust, king pulse, bob
// ═══════════════════════════════════════════

const particlePool = [];

function burst(r, f, colors = [0xff6600, 0xffcc00, 0xff44aa, 0xaa44ff]) {
  const { x, z } = boardToWorld(r, f);
  for (let i = 0; i < 20; i++) {
    const col     = colors[Math.floor(Math.random() * colors.length)];
    const mesh    = new THREE.Mesh(
      new THREE.SphereGeometry(.038, 4, 4),
      new THREE.MeshBasicMaterial({ color:col, transparent:true, opacity:1 })
    );
    mesh.position.set(
      x + (Math.random()-.5)*.5,
      .3 + Math.random()*.3,
      z + (Math.random()-.5)*.5
    );
    mesh.userData.velocity = new THREE.Vector3(
      (Math.random()-.5)*.08, .08 + Math.random()*.1, (Math.random()-.5)*.08
    );
    mesh.userData.life = 0;
    scene.add(mesh);
    particlePool.push(mesh);
  }
}

function tickParticles() {
  for (let i = particlePool.length - 1; i >= 0; i--) {
    const p = particlePool[i];
    p.userData.life += .025;
    p.position.add(p.userData.velocity);
    p.userData.velocity.y -= .003; // gravity
    p.material.opacity = 1 - p.userData.life;
    if (p.userData.life >= 1) {
      scene.remove(p);
      particlePool.splice(i, 1);
    }
  }
}

// Ambient floating dust
const DUST_COUNT = 90;
const dustPositions = new Float32Array(DUST_COUNT * 3);
for (let i = 0; i < DUST_COUNT; i++) {
  dustPositions[i*3]   = (Math.random()-.5)*22;
  dustPositions[i*3+1] = Math.random()*8 + .5;
  dustPositions[i*3+2] = (Math.random()-.5)*22;
}
const dustGeo = new THREE.BufferGeometry();
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
scene.add(new THREE.Points(dustGeo, new THREE.PointsMaterial({
  color: 0xaa44ff, size: .048, transparent: true, opacity: .2,
})));

function tickDust() {
  const pos = dustGeo.attributes.position;
  for (let i = 0; i < DUST_COUNT; i++) {
    pos.array[i*3+1] += .002;
    if (pos.array[i*3+1] > 9) pos.array[i*3+1] = .5;
  }
  pos.needsUpdate = true;
}

// King pulse (red glow when in check)
let kingPulseData = null;
let kingPulseTime = 0;

function startKingPulse(r, f) {
  kingPulseData = { r, f };
  kingPulseTime = 0;
}

function stopKingPulse() {
  if (!kingPulseData) return;
  const data = getPieceAt(kingPulseData.r, kingPulseData.f);
  if (data) {
    const isW = data.c === W;
    data.g.traverse(m => {
      // Only MeshStandardMaterial has emissive — skip outline/fresnel meshes
      if (m.isMesh && !m.userData.isOutline && m.material.emissive) {
        m.material.emissive.set(isW ? 0x220044 : 0x880055);
        m.material.emissiveIntensity = isW ? .08 : .15;
      }
    });
  }
  kingPulseData = null;
}

function tickKingPulse() {
  if (!kingPulseData) return;
  kingPulseTime += .06;
  const data = getPieceAt(kingPulseData.r, kingPulseData.f);
  if (!data) return;
  const v = Math.max(0, Math.sin(kingPulseTime * 3) * .5 + .5);
  data.g.traverse(m => {
    // Only MeshStandardMaterial has .emissive — skip outline (MeshBasicMaterial) and fresnel (ShaderMaterial)
    if (m.isMesh && !m.userData.isOutline && m.material.emissive) {
      m.material.emissive.set(1, 0, .08 * v);
      m.material.emissiveIntensity = .25 + v * 1.3;
    }
  });
}

// Selected piece bob animation
let selectedRow = -1, selectedFile = -1;

function tickBobAnimation() {
  for (const [, data] of pieces) {
    const isSelected = data.r === selectedRow && data.f === selectedFile;
    const isPulsing  = kingPulseData && data.r === kingPulseData.r && data.f === kingPulseData.f;
    if (isSelected)       data.g.position.y = Math.sin(Date.now() * .005) * .07 + .09;
    else if (!isPulsing)  data.g.position.y = 0;
  }
}


// ═══════════════════════════════════════════
//  8. RAYCASTING — click/tap → board square
// ═══════════════════════════════════════════

const raycaster   = new THREE.Raycaster();
const mouseVec    = new THREE.Vector2();

function getSquareFromPointer(pointerEvent) {
  const rect = canvas.getBoundingClientRect();
  mouseVec.x = ((pointerEvent.clientX - rect.left) / rect.width)  * 2 - 1;
  mouseVec.y = -((pointerEvent.clientY - rect.top)  / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouseVec, camera);

  // First check piece meshes (more precise feel)
  const pieceMeshes = [];
  pieces.forEach(data => data.g.traverse(m => {
    if (m.isMesh && !m.userData.isOutline) pieceMeshes.push(m);
  }));
  const pieceHits = raycaster.intersectObjects(pieceMeshes);
  if (pieceHits.length) {
    const u = pieceHits[0].object.userData;
    return { r: u.r, f: u.f };
  }

  // Fall back to board squares
  const squareHits = raycaster.intersectObjects(squares.flat());
  if (squareHits.length) {
    const u = squareHits[0].object.userData;
    return { r: u.r, f: u.f };
  }

  return null;
}

// 3D world position → screen space (for floating labels)
function floatScore(r, f, text, cssClass = 'cap') {
  const { x, z } = boardToWorld(r, f);
  const proj      = new THREE.Vector3(x, 1.5, z).project(camera);
  const el        = document.createElement('div');
  el.className    = `dmg ${cssClass}`;
  el.textContent  = text;
  el.style.left   = (proj.x * .5 + .5) * innerWidth  + 'px';
  el.style.top    = (-proj.y * .5 + .5) * innerHeight + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 960);
}

// Screen shake on capture
function screenShake() {
  canvas.classList.remove('shake');
  void canvas.offsetWidth; // force reflow to restart animation
  canvas.classList.add('shake');
  setTimeout(() => canvas.classList.remove('shake'), 300);
}


// ═══════════════════════════════════════════
//  9. NETWORKING — PeerJS WebRTC peer-to-peer
//
//  FIX: Added STUN/TURN config for better NAT traversal.
//  FIX: Guest peer now waits for 'open' before connecting.
//  FIX: setupConn() called only after connection is ready.
//  FIX: Reconnect retry on unavailable-id for host.
// ═══════════════════════════════════════════

let peer       = null;
let conn       = null;
let onlineRole = null; // 'host' | 'guest'

// PeerJS config with public STUN servers for better connectivity
const PEER_CONFIG = {
  config: {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
      { urls: 'stun:global.stun.twilio.com:3478' },
    ],
  },
};

function generateRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ'; // no I/O to avoid confusion
  return Array.from({ length:4 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
}

function roomCodeToPeerId(code) {
  return 'chessarc-' + code.toLowerCase();
}

function closePeer() {
  if (conn)  { try { conn.close();    } catch(e) {} conn  = null; }
  if (peer)  { try { peer.destroy();  } catch(e) {} peer  = null; }
  onlineRole = null;
}

function createRoom() {
  closePeer();
  const code = generateRoomCode();
  const id   = document.getElementById('op-code');
  const stat = document.getElementById('op-wait-status');

  id.textContent   = code;
  stat.innerHTML   = '<span class="spinner">↻</span> CONNECTING...';
  showOnlinePanel('waiting');
  updateInviteDisplay(code); // populate the shareable link

  peer = new Peer(roomCodeToPeerId(code), PEER_CONFIG);

  peer.on('open', () => {
    stat.innerHTML = '<span class="spinner">↻</span> WAITING FOR OPPONENT...';
  });

  peer.on('connection', incomingConn => {
    conn       = incomingConn;
    onlineRole = 'host';

    // Set up data/disconnect handlers before the connection opens
    setupConnectionHandlers();

    conn.on('open', () => {
      const ts = chosenOnlineTimer;
      const msg = { type:'start', guestColor:B, timerSecs:ts };
      if (pendingCustomBoard) msg.customBoard = pendingCustomBoard;
      conn.send(msg);
      showOnlinePanel('none');
      if (pendingCustomBoard) {
        startGameWithCustomBoard('online', W, 1, ts, pendingCustomBoard);
        pendingCustomBoard = null;
      } else {
        startGame('online', W, 1, ts);
      }
      SFX.connect();
    });
  });

  peer.on('error', err => {
    // Retry with a new code if this one was taken
    if (err.type === 'unavailable-id') { createRoom(); return; }
    stat.textContent  = 'ERROR: ' + err.type;
    stat.className    = 'op-status err';
  });
}

function joinRoom(code) {
  closePeer();
  const stat = document.getElementById('op-join-status');
  stat.innerHTML  = '<span class="spinner">↻</span> CONNECTING...';
  stat.className  = 'op-status';

  // Guest creates a random peer ID, then connects to host once open
  peer = new Peer(undefined, PEER_CONFIG);

  peer.on('open', () => {
    conn = peer.connect(roomCodeToPeerId(code), { reliable: true });
    setupConnectionHandlers();
    conn.on('open', () => {
      stat.textContent = 'CONNECTED! WAITING FOR HOST...';
      stat.className   = 'op-status ok';
    });
  });

  peer.on('error', err => {
    stat.textContent = 'ERR: ' + err.type;
    stat.className   = 'op-status err';
  });
}

function setupConnectionHandlers() {
  conn.on('data',  handleNetworkData);
  conn.on('close', handleDisconnect);
  conn.on('error', handleDisconnect);
}

function handleNetworkData(data) {
  if (data.type === 'start') {
    onlineRole = 'guest';
    showOnlinePanel('none');
    // Host may send a custom board for setup mode games
    if (data.customBoard) {
      startGameWithCustomBoard('online', data.guestColor, 1, data.timerSecs || 0, data.customBoard);
    } else {
      startGame('online', data.guestColor, 1, data.timerSecs || 0);
    }
    SFX.connect();
  } else if (data.type === 'move') {
    doExecute(data.fr, data.to, data.prom, /* fromNet */ true);
  } else if (data.type === 'resign') {
    ui.goTitle.textContent = 'OPPONENT QUIT';
    ui.goSub.textContent   = 'YOU WIN!';
    ui.go.classList.add('on');
    SFX.win();
  }
}

function handleDisconnect() {
  if (mode === 'online') {
    ui.goTitle.textContent = 'DISCONNECTED';
    ui.goSub.textContent   = 'OPPONENT LEFT';
    ui.go.classList.add('on');
  }
}

function showOnlinePanel(view) {
  ['op-menu', 'op-waiting', 'op-joining'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  if (view === 'menu')    document.getElementById('op-menu').style.display    = 'block';
  if (view === 'waiting') document.getElementById('op-waiting').style.display = 'block';
  if (view === 'joining') document.getElementById('op-joining').style.display = 'block';
  document.getElementById('online-overlay').classList.toggle('on', view !== 'none');
}


// ═══════════════════════════════════════════
//  10. TIMER — chess clocks
// ═══════════════════════════════════════════

let timerTotal    = 0; // configured seconds per player
let timerWhite    = 0; // seconds remaining for white
let timerBlack    = 0; // seconds remaining for black
let timerInterval = null;

function initTimer(seconds) {
  timerTotal = seconds;
  timerWhite = seconds;
  timerBlack = seconds;
  const clockW = document.getElementById('clock-w');
  const clockB = document.getElementById('clock-b');
  clockW.classList.toggle('visible', seconds > 0);
  clockB.classList.toggle('visible', seconds > 0);
  renderClocks();
}

function startTimerTick() {
  stopTimerTick();
  if (!timerTotal) return;
  timerInterval = setInterval(() => {
    if (chess.status !== 'playing' && chess.status !== 'check') return;
    if (chess.turn === W) {
      timerWhite = Math.max(0, timerWhite - 1);
      if (timerWhite <= 10 && timerWhite > 0) SFX.lowtime();
      if (timerWhite === 0) { stopTimerTick(); triggerTimeout(W); return; }
    } else {
      timerBlack = Math.max(0, timerBlack - 1);
      if (timerBlack <= 10 && timerBlack > 0) SFX.lowtime();
      if (timerBlack === 0) { stopTimerTick(); triggerTimeout(B); return; }
    }
    renderClocks();
  }, 1000);
}

function stopTimerTick() {
  clearInterval(timerInterval);
  timerInterval = null;
}

function triggerTimeout(loser) {
  const winner = loser === W ? B : W;
  burst(3, 3, [0xffd700, 0xff8800, 0xffffff, 0xff4444]);
  ui.goTitle.textContent = "TIME'S UP!";
  ui.goSub.textContent   = `${winner === W ? 'WHITE' : 'BLACK'} WINS ON TIME`;
  ui.go.classList.add('on');
  SFX.timeout();
  if (winner === myColor) setTimeout(SFX.win, 600);
  else setTimeout(SFX.lose, 600);
}

function formatTime(secs) {
  if (!timerTotal) return '--:--';
  const m = String(Math.floor(secs / 60)).padStart(2, '0');
  const s = String(secs % 60).padStart(2, '0');
  return `${m}:${s}`;
}

function renderClocks() {
  const clockW  = document.getElementById('clock-w');
  const clockB  = document.getElementById('clock-b');
  const dispW   = document.getElementById('timer-w');
  const dispB   = document.getElementById('timer-b');
  if (!clockW || !clockB || !dispW || !dispB) return;

  dispW.textContent = formatTime(timerWhite);
  dispB.textContent = formatTime(timerBlack);

  const hasClock = !!timerTotal;
  clockW.classList.toggle('active', hasClock && chess.turn === W);
  clockB.classList.toggle('active', hasClock && chess.turn === B);
  clockW.classList.toggle('low',  hasClock && timerWhite <= 30 && timerWhite > 10);
  clockB.classList.toggle('low',  hasClock && timerBlack <= 30 && timerBlack > 10);
  clockW.classList.toggle('crit', hasClock && timerWhite <= 10 && timerWhite > 0);
  clockB.classList.toggle('crit', hasClock && timerBlack <= 10 && timerBlack > 0);
}


// ═══════════════════════════════════════════
//  11. GAME CONTROLLER
// ═══════════════════════════════════════════

let chess = new Chess();
let mode     = null;   // 'ai' | 'online' | 'local'
let myColor  = W;
let aiDiff   = 1;

// Selection + move state
let selSq         = null;  // { r, f } of selected square
let legalMoveCache = [];   // legal moves for selected piece
let lastFr        = null;  // last move from
let lastTo        = null;  // last move to

// Flags
let isBusy    = false; // animation in progress
let isAiThinking = false;
let pendingPromo  = null; // { fr, to } awaiting promotion choice
let captureLog    = { w:[], b:[] }; // captured piece types per side

const PIECE_NAMES = { p:'PAWN', r:'ROOK', n:'KNIGHT', b:'BISHOP', q:'QUEEN', k:'KING' };
const CAPTURE_VALUES = { p:1, n:3, b:3, r:5, q:9 };
const DIFF_NAMES = { 1:'ELO 1200', 2:'ELO 1700', 3:'FULL STR' };

// Cache all the DOM refs we touch repeatedly
const ui = {
  landing:   document.getElementById('landing'),
  hud:       document.getElementById('hud'),
  go:        document.getElementById('gameover'),
  promo:     document.getElementById('promo'),
  turn:      document.getElementById('turn-pill'),
  statusTxt: document.getElementById('status-txt'),
  selLabel:  document.getElementById('sel-label'),
  goTitle:   document.getElementById('go-title'),
  goSub:     document.getElementById('go-sub'),
  modeTag:   document.getElementById('mode-tag'),
  capTray:   document.getElementById('cap-tray'),
  chkFlash:  document.getElementById('chkflash'),
};

function startGame(m, col, diff, timerSeconds = 0) {
  mode    = m;
  myColor = col;
  aiDiff  = diff || 1;

  chess.reset();
  syncBoardToScene(chess, /* rainEffect */ true);
  setTimeout(orientAllKnights, 800);

  clearHighlights();
  removeSelectionRing();
  selSq          = null;
  legalMoveCache = [];
  lastFr = lastTo = null;
  isBusy    = false;
  isAiThinking = false;
  captureLog    = { w:[], b:[] };
  selectedRow = selectedFile = -1;
  stopKingPulse();
  stopTimerTick();
  resetHistoryPanel();

  ui.landing.style.display = 'none';
  ui.hud.classList.add('on');
  ui.go.classList.remove('on');
  ui.statusTxt.classList.remove('on');
  ui.selLabel.textContent = '';

  ui.modeTag.textContent = m === 'online'
    ? 'ONLINE 1v1'
    : `VS AI ${DIFF_NAMES[aiDiff]}`;

  // Face the board toward the player
  camera.position.set(0, 10, col === B ? -9.5 : 9.5);
  controls.target.set(0, 0, 0);
  controls.update();

  initTimer(timerSeconds);
  startTimerTick();
  refreshHUD();
  updateSfTag(); // show engine status badge
  ensureBgmStarted(); // music starts on first game if not already playing

  // If AI goes first (player chose black)
  if (m === 'ai' && chess.turn !== myColor) setTimeout(runAi, 1200);
}

function refreshHUD() {
  const name = chess.turn === W ? 'WHITE' : 'BLACK';
  if (isAiThinking) {
    ui.turn.innerHTML = `<span style="color:#ffd700">THINKING...</span>`;
  } else {
    ui.turn.textContent = `${name}'S TURN`;
  }
  // Captured piece icons
  const icons  = { p:'♟', r:'♜', n:'♞', b:'♝', q:'♛', k:'♚' };
  const whiteCaptures = captureLog.w.map(t => icons[t]).join('');
  const blackCaptures = captureLog.b.map(t => icons[t]).join('');
  ui.capTray.textContent = (whiteCaptures || blackCaptures)
    ? `${blackCaptures} ${whiteCaptures}` : '';
  renderClocks();
}

function showCheckEffect() {
  // Re-trigger animation by removing class, forcing reflow, then re-adding
  ui.statusTxt.classList.remove('on');
  void ui.statusTxt.offsetWidth;
  ui.statusTxt.classList.add('on');
  ui.chkFlash.classList.remove('on');
  void ui.chkFlash.offsetWidth;
  ui.chkFlash.classList.add('on');
  setTimeout(() => ui.statusTxt.classList.remove('on'), 1800);
}

function runAi() {
  if (chess.turn === myColor) return;
  if (chess.status === 'checkmate' || chess.status === 'stalemate') return;
  isAiThinking = true;
  refreshHUD();
  // pickAiMove returns a Promise (Stockfish async or instant minimax fallback)
  pickAiMove(chess, aiDiff).then(mv => {
    isAiThinking = false;
    if (mv) doExecute(mv.fr, mv.to, mv.prom || 'q');
    else refreshHUD();
  });
}

// Commit a move: update engine, animate piece, handle side effects
function doExecute(fr, to, prom, fromNetwork = false) {
  if (isBusy) return;

  // Read the moving piece BEFORE calling chess.move() — it clears the fr square
  const movingPiece = chess.at(fr.r, fr.f);
  if (!movingPiece) return;

  const result = chess.move(fr, to, prom);
  if (!result) return;

  const { mv, cap, status } = result;
  const movedColor           = chess.turn === W ? B : W; // turn already flipped

  // Record move in history — pass piece data we captured before the move
  pushMoveHistory(mv, cap, status, prom, movedColor, movingPiece.t);

  // Relay move to opponent if we made it locally
  if (!fromNetwork && conn && mode === 'online') {
    conn.send({ type:'move', fr, to, prom });
  }

  // Ghost trail: show translucent origin ghost on AI and opponent moves
  const isOpponentMove = fromNetwork || (mode === 'ai' && movedColor !== myColor);
  if (isOpponentMove) spawnGhostTrail(movingPiece.t, movedColor, fr.r, fr.f);

  // Handle captures
  if (cap) {
    despawnPiece(to.r, to.f);
    burst(to.r, to.f, movedColor === W
      ? [0xffd700, 0xffeedd, 0xffaa44]
      : [0xff44aa, 0xaa22ff, 0xff2266]);
    captureLog[cap.c === W ? 'b' : 'w'].push(cap.t);
    const val = CAPTURE_VALUES[cap.t];
    if (val) floatScore(to.r, to.f, `+${val}`, 'cap');
    SFX.capture();
    screenShake();
  } else if (mv.sp === 'cK' || mv.sp === 'cQ') {
    SFX.castle();
  } else {
    SFX.move();
  }

  // Handle rook movement for castling animation
  if (mv.sp === 'cK') animateMove(fr.r, 7, fr.r, 5);
  else if (mv.sp === 'cQ') animateMove(fr.r, 0, fr.r, 3);

  // En passant captured pawn cleanup
  if (mv.sp === 'ep') {
    const capturedColor = chess.turn === W ? B : W;
    const epRow         = capturedColor === W ? to.r-1 : to.r+1;
    const epData        = despawnPiece(epRow, to.f);
    if (epData) {
      burst(epRow, to.f, [0xff6600, 0xffcc00]);
      captureLog[epData.c === W ? 'b' : 'w'].push(epData.t);
    }
  }

  // Animate the main piece, then resolve post-move state
  isBusy = true;
  animateMove(fr.r, fr.f, to.r, to.f, () => {
    isBusy = false;

    // Pawn promotion: replace pawn with new piece
    if (mv.sp === 'prom') {
      const pc = chess.bd[to.r][to.f];
      despawnPiece(to.r, to.f);
      spawnPiece(prom, pc.c, to.r, to.f);
      burst(to.r, to.f, [0xffd700, 0xffaa00, 0xff6600, 0xffffff]);
      floatScore(to.r, to.f, 'PROMO!', 'prm');
      SFX.promote();
    }

    lastFr         = { r:fr.r, f:fr.f };
    lastTo         = { r:to.r, f:to.f };
    selSq          = null;
    legalMoveCache = [];
    selectedRow    = selectedFile = -1;
    removeSelectionRing();
    ui.selLabel.textContent = '';
    orientAllKnights();
    refreshHighlights();
    refreshHUD();

    // End-game states
    if (status === 'checkmate' || status === 'stalemate') {
      stopTimerTick();
      burst(to.r, to.f, [0xffd700, 0xff8800, 0xffffff, 0xff44ff]);
      setTimeout(() => {
        const winner = chess.turn === W ? B : W;
        ui.goTitle.textContent = status === 'checkmate' ? 'CHECKMATE!' : 'STALEMATE';
        ui.goSub.textContent   = status === 'checkmate'
          ? `${winner === W ? 'WHITE' : 'BLACK'} WINS`
          : "IT'S A DRAW";
        ui.go.classList.add('on');
        if (status === 'checkmate') {
          if (winner === myColor) SFX.win(); else SFX.lose();
        }
      }, 1200);

    } else if (status === 'check') {
      const k = chess._findKing(chess.turn);
      if (k) {
        startKingPulse(k.r, k.f);
        burst(k.r, k.f, [0xff2244, 0xff6644, 0xffaa44]);
        SFX.check();
        showCheckEffect();
      }
    } else {
      stopKingPulse();
      ui.statusTxt.classList.remove('on');
    }

    // Queue AI move if it's the AI's turn
    if (mode === 'ai' && chess.turn !== myColor && (status === 'playing' || status === 'check'))
      setTimeout(runAi, 660);
  });
}

// Handle a click/tap on the board
function handleSquareClick(r, f) {
  if (isBusy || isAiThinking) return;
  if (chess.status === 'checkmate' || chess.status === 'stalemate') return;
  if (mode === 'ai'     && chess.turn !== myColor) return;
  if (mode === 'online' && chess.turn !== myColor) return;

  const piece = chess.at(r, f);

  if (selSq) {
    // Something is already selected — check if this is a valid target
    const move = legalMoveCache.find(m => m.to.r === r && m.to.f === f);

    if (move) {
      selSq = null; selectedRow = selectedFile = -1;
      removeSelectionRing();
      ui.selLabel.textContent = '';
      // Pawn promotion: show picker first
      if (move.sp === 'prom') {
        pendingPromo = { fr: move.fr, to: move.to };
        showPromoPickerFor(chess.turn);
        return;
      }
      doExecute(move.fr, move.to, 'q');

    } else if (piece && piece.c === chess.turn) {
      // Clicked a friendly piece — reselect it
      selSq          = { r, f };
      selectedRow    = r; selectedFile = f;
      legalMoveCache = chess.legal(r, f);
      showSelectionRing(r, f);
      ui.selLabel.textContent = `${piece.c === W ? 'WHITE' : 'BLACK'} ${PIECE_NAMES[piece.t]}`;
      SFX.select();
      refreshHighlights();

    } else {
      // Clicked empty/enemy with no move — deselect
      selSq          = null; selectedRow = selectedFile = -1;
      removeSelectionRing();
      legalMoveCache = [];
      ui.selLabel.textContent = '';
      refreshHighlights();
    }

  } else if (piece && piece.c === chess.turn) {
    // Nothing selected — select this piece
    selSq          = { r, f };
    selectedRow    = r; selectedFile = f;
    legalMoveCache = chess.legal(r, f);
    showSelectionRing(r, f);
    ui.selLabel.textContent = `${piece.c === W ? 'WHITE' : 'BLACK'} ${PIECE_NAMES[piece.t]}`;
    SFX.select();
    refreshHighlights();
  }
}

function showPromoPickerFor(color) {
  ui.promo.classList.add('on');

    w: { q:'♕', r:'♖', b:'♗', n:'♘' },

  };
  ui.promo.querySelectorAll('.pbtn').forEach(btn => {
    btn.textContent = symbols[color][btn.dataset.p];

}


// ═══════════════════════════════════════════
//  11b. SETUP MODE — pre-game board editor
//
//  Flow (Online):
//    Online 1v1 → "Create Room — Custom Setup"
//    → setupEnter('online') → edit board
//    → "Create Room" button → createRoom() with pendingCustomBoard set
//    → waiting screen with code → opponent joins → both load custom board
//
//  Flow (AI):
//    "Custom Setup" via AI menu or direct call
//    → setupEnter('ai') → edit board → "Start Game" → immediate start
//
//  Validation:
//    - Exactly one king per side required
//    - Neither king may be in check in the starting position
//    - Pawns may not be placed on rank 1 or rank 8 (promotion rows)
// ═══════════════════════════════════════════

let setupBoard   = null;
let setupHeld    = null;    // { t, c } currently held piece chip, or null
let setupErasing = false;
let inSetupMode  = false;

// Config saved when entering setup, used when game starts
let pendingSetupMode   = null;   // 'ai' | 'online'
let pendingSetupColor  = W;
let pendingSetupDiff   = 1;
let pendingSetupTimer  = 0;
let pendingCustomBoard = null;   // non-null = host has a custom board to send

const PIECE_SYMBOLS = {
  w: { k:'♔', q:'♕', r:'♖', b:'♗', n:'♘', p:'♙' },
  b: { k:'♚', q:'♛', r:'♜', b:'♝', n:'♞', p:'♟' },
};

// Enter setup mode. gameMode='online' changes button label to "Create Room".
function setupEnter(gameMode, col, diff, timerSecs) {
  inSetupMode       = true;
  pendingSetupMode  = gameMode;
  pendingSetupColor = col;
  pendingSetupDiff  = diff;
  pendingSetupTimer = timerSecs;
  setupHeld         = null;
  setupErasing      = false;

  // Start from standard position
  const fresh = new Chess();
  setupBoard = fresh.bd.map(row => row.map(p => p ? {...p} : null));

  // Hide all other UI, show the 3D board bare
  ui.landing.style.display = 'none';
  document.getElementById('online-overlay').classList.remove('on');
  ui.hud.classList.remove('on');
  ui.go.classList.remove('on');

  // Render the setup board in 3D
  const tempCh = new Chess();
  tempCh.bd = setupBoard;
  syncBoardToScene(tempCh);
  orientAllKnights();

  camera.position.set(0, 10, col === B ? -9.5 : 9.5);
  controls.target.set(0, 0, 0);
  controls.update();

  // Set action button label based on context
  const startBtn = document.getElementById('setup-start-btn');
  if (gameMode === 'online') {
    startBtn.textContent = 'Create Room';
  } else {
    startBtn.textContent = 'Start Game';
  }

  document.getElementById('setup-overlay').classList.add('on');
  updateSetupCursor();
  updateSetupStatus();
}

function setupExit() {
  inSetupMode  = false;
  setupHeld    = null;
  setupErasing = false;
  setupBoard   = null;
  document.getElementById('setup-overlay').classList.remove('on');
  document.getElementById('setup-cursor').style.display = 'none';
  document.querySelectorAll('.pchip').forEach(c => c.classList.remove('active'));
  document.getElementById('setup-erase').classList.remove('active');

  // Restore the standard board view
  syncBoardToScene(chess);

  // Return to the right place based on where we came from
  if (pendingSetupMode === 'online') {
    // Show landing behind the overlay (so ← Back on op-menu works)
    ui.landing.style.display = 'flex';
    showOnlinePanel('menu');
  } else {
    ui.landing.style.display = 'flex';
  }
}

// Tap a square during setup
function handleSetupClick(r, f) {
  if (setupErasing) {
    if (setupBoard[r][f]) {
      setupBoard[r][f] = null;
      despawnPiece(r, f);
    }
    updateSetupStatus();
    return;
  }
  if (setupHeld) {
    // Block pawns on rank 1 (row 0) and rank 8 (row 7) — illegal in chess
    if (setupHeld.t === PT.P && (r === 0 || r === 7)) {
      SFX.error();
      const stat = document.getElementById('setup-status');
      stat.textContent = 'Pawns cannot be on rank 1 or 8';
      stat.className   = 'err';
      return;
    }
    const existing = setupBoard[r][f];
    if (existing && existing.t === setupHeld.t && existing.c === setupHeld.c) {
      setupBoard[r][f] = null;
      despawnPiece(r, f);
    } else {
      if (existing) despawnPiece(r, f);
      setupBoard[r][f] = { t: setupHeld.t, c: setupHeld.c, m: 0 };
      spawnPiece(setupHeld.t, setupHeld.c, r, f);
    }
    updateSetupStatus();
    SFX.select();
    return;
  }
  // Nothing held — pick up existing piece
  const pc = setupBoard[r][f];
  if (pc) {
    setupHeld    = { t: pc.t, c: pc.c };
    setupErasing = false;
    updateSetupCursor();
    updatePaletteActiveState();
    SFX.select();
  }
}

document.addEventListener('mousemove', e => {
  const cur = document.getElementById('setup-cursor');
  if (!inSetupMode || !cur) return;
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});

function updateSetupCursor() {
  const cur = document.getElementById('setup-cursor');
  if (!cur) return;
  if (setupHeld && !setupErasing) {
    cur.textContent   = PIECE_SYMBOLS[setupHeld.c][setupHeld.t];
    cur.style.display = 'block';
  } else {
    cur.style.display = 'none';
  }
}

function updatePaletteActiveState() {
  document.querySelectorAll('.pchip[data-piece]').forEach(chip => {
    const match = setupHeld
      && chip.dataset.piece === setupHeld.t
      && chip.dataset.color === setupHeld.c;
    chip.classList.toggle('active', !!match);
  });
  document.getElementById('setup-erase').classList.toggle('active', setupErasing);
}

// Full validation with check detection using the engine's own inCheck().
// Returns { ok: bool, message: string }
function setupValidateFull() {
  const wKings = countPieces(setupBoard, PT.K, W);
  const bKings = countPieces(setupBoard, PT.K, B);

  if (wKings === 0 && bKings === 0) return { ok: false, msg: 'Need both kings to start' };
  if (wKings === 0)  return { ok: false, msg: 'Missing white king' };
  if (bKings === 0)  return { ok: false, msg: 'Missing black king' };
  if (wKings > 1)    return { ok: false, msg: 'Only one white king allowed' };
  if (bKings > 1)    return { ok: false, msg: 'Only one black king allowed' };

  // Use the engine to check for immediate check — borrow a temporary Chess instance
  const probe = new Chess();
  probe.bd    = setupBoard.map(row => row.map(p => p ? {...p} : null));
  probe.cr    = { w:{ k:0, q:0 }, b:{ k:0, q:0 } };
  probe.ep    = null;

  // White's king must not be in check from black (it's white's turn first)
  probe.turn = W;
  if (probe.inCheck(W)) return { ok: false, msg: 'White king is in check at start' };

  // Black's king also must not be in check — white just moved, black can't be in check
  // unless the position is otherwise illegal
  if (probe.inCheck(B)) return { ok: false, msg: 'Black king is in check at start' };

  return { ok: true, msg: `${setupBoard.flat().filter(Boolean).length} pieces — ready` };
}

function updateSetupStatus() {
  const stat  = document.getElementById('setup-status');
  const result = setupValidateFull();
  stat.textContent = result.msg;
  stat.className   = result.ok ? 'ok' : 'err';
}

function countPieces(bd, type, color) {
  let n = 0;
  for (let r = 0; r < 8; r++)
    for (let f = 0; f < 8; f++) {
      const p = bd[r][f];
      if (p && p.t === type && p.c === color) n++;
    }
  return n;
}

// Called when the action button is pressed ("Start Game" or "Create Room")
function setupStart() {
  const result = setupValidateFull();
  if (!result.ok) {
    SFX.error();
    const stat = document.getElementById('setup-status');
    stat.className = 'err';
    stat.textContent = result.msg;
    // Brief visual shake on the bar
    const bar = document.getElementById('setup-bar');
    bar.style.animation = 'none'; void bar.offsetWidth;
    bar.style.animation = 'statusSlam 200ms ease';
    return;
  }

  SFX.btnStart();
  const bd = setupBoard.map(row => row.map(p => p ? {...p} : null));

  // Exit setup visuals
  inSetupMode = false;
  document.getElementById('setup-overlay').classList.remove('on');
  document.getElementById('setup-cursor').style.display = 'none';

  if (pendingSetupMode === 'online') {
    // Store the board and create the room — the board will be sent to guest on connect
    pendingCustomBoard = bd;
    createRoom();
  } else {
    startGameWithCustomBoard(pendingSetupMode, pendingSetupColor, pendingSetupDiff, pendingSetupTimer, bd);
  }
}

// Start game with a custom board loaded into the engine
function startGameWithCustomBoard(m, col, diff, timerSecs, bd) {
  mode    = m;
  myColor = col;
  aiDiff  = diff || 1;

  chess.loadPosition(bd);
  syncBoardToScene(chess, /* rain */ true);
  setTimeout(orientAllKnights, 800);

  clearHighlights();
  removeSelectionRing();
  selSq = null; legalMoveCache = []; lastFr = lastTo = null;
  isBusy = false; isAiThinking = false;
  captureLog = { w:[], b:[] };
  selectedRow = selectedFile = -1;
  stopKingPulse(); stopTimerTick();
  resetHistoryPanel();

  ui.landing.style.display = 'none';
  ui.hud.classList.add('on');
  ui.go.classList.remove('on');
  ui.statusTxt.classList.remove('on');
  ui.selLabel.textContent = '';

  ui.modeTag.textContent = m === 'online' ? 'CUSTOM ONLINE' : 'CUSTOM VS AI';

  camera.position.set(0, 10, col === B ? -9.5 : 9.5);
  controls.target.set(0, 0, 0); controls.update();

  initTimer(timerSecs); startTimerTick();
  refreshHUD(); updateSfTag();

  if (m === 'ai' && chess.turn !== myColor) setTimeout(runAi, 1200);
}

// ═══════════════════════════════════════════
//  11c. MOVE HISTORY — algebraic notation log
//
//  Generates standard short algebraic notation (SAN-lite).
//  Pairs moves into rows (white + black per turn number).
//  Works for both local and multiplayer — doExecute calls
//  pushMoveHistory() after every committed move regardless of source.
// ═══════════════════════════════════════════

let moveHistory     = [];   // flat list of notation strings
let historyVisible  = false;

const FILE_NAMES = ['a','b','c','d','e','f','g','h'];
const PIECE_SAN  = { p:'', r:'R', n:'N', b:'B', q:'Q', k:'K' };

// Build readable short algebraic notation for a move.
// pieceType is the type of the piece that moved (read before chess.move() clears the square).
// Called AFTER chess.move() so status reflects the resulting position.
function buildNotation(mv, cap, status, prom, pieceType) {
  const { fr, to, sp } = mv;

  if (sp === 'cK') return 'O-O';
  if (sp === 'cQ') return 'O-O-O';

  const piece    = PIECE_SAN[pieceType] ?? '';
  const toFile   = FILE_NAMES[to.f];
  const toRank   = to.r + 1;
  const capture  = (cap || sp === 'ep') ? 'x' : '';
  // Pawns include origin file on captures
  const fromHint = (!piece && capture) ? FILE_NAMES[fr.f] : '';
  const promSuf  = sp === 'prom' ? `=${(prom || 'q').toUpperCase()}` : '';
  const checkSuf = status === 'checkmate' ? '#' : status === 'check' ? '+' : '';

  return `${piece}${fromHint}${capture}${toFile}${toRank}${promSuf}${checkSuf}`;
}

function pushMoveHistory(mv, cap, status, prom, movedColor, pieceType) {
  const notation = buildNotation(mv, cap, status, prom, pieceType);
  moveHistory.push({ notation, color: movedColor });
  renderMoveHistory();
}

function clearMoveHistory() {
  moveHistory = [];
  const list = document.getElementById('history-list');
  if (list) list.innerHTML = '';
}

function renderMoveHistory() {
  const list = document.getElementById('history-list');
  if (!list) return;

  // Build rows: pair white + black moves together
  const rows = [];
  for (let i = 0; i < moveHistory.length; i += 2) {
    rows.push({
      num:   Math.floor(i / 2) + 1,
      white: moveHistory[i]?.notation   || '',
      black: moveHistory[i+1]?.notation || '',
    });
  }

  list.innerHTML = rows.map((row, idx) => {
    const isLatest = idx === rows.length - 1;
    return `<div class="hist-row${isLatest ? ' latest' : ''}">
      <span class="hist-num">${row.num}.</span>
      <span class="hist-w">${row.white}</span>
      <span class="hist-b">${row.black}</span>
    </div>`;
  }).join('');

  // Auto-scroll to bottom
  list.scrollTop = list.scrollHeight;
}

function toggleHistoryPanel() {
  historyVisible = !historyVisible;
  document.getElementById('history-panel').classList.toggle('open', historyVisible);
  document.getElementById('btn-history').classList.toggle('active', historyVisible);
}

function resetHistoryPanel() {
  historyVisible = false;
  document.getElementById('history-panel').classList.remove('open');
  document.getElementById('btn-history').classList.remove('active');
  clearMoveHistory();
}


// ═══════════════════════════════════════════
//  11d. GHOST PIECE TRAIL — AI/opponent move preview
//
//  When an opponent or AI move happens, we spawn a
//  semi-transparent copy of the piece at the origin square
//  and fade it out over 600ms. Gives players a clear visual
//  of where the piece came from — especially useful for AI.
//
//  Only fires on non-player moves (fromNetwork=true or AI).
//  Does NOT fire on the local player's own moves.
// ═══════════════════════════════════════════

function spawnGhostTrail(type, color, r, f) {
  // Build a ghost group — same geometry, transparent material
  const isWhite = color === W;
  const ghostMat = new THREE.MeshStandardMaterial({
    color:     isWhite ? 0xeee8ff : 0x8844aa,
    roughness: .9,
    metalness: 0,
    transparent: true,
    opacity: .45,
    depthWrite: false,
  });

  // Re-use buildPieceMesh then override materials
  const group = buildPieceMesh(type, color);
  group.traverse(m => {
    if (m.isMesh && !m.userData.isOutline) {
      m.material   = ghostMat;
      m.castShadow = false;
    } else if (m.isMesh && m.userData.isOutline) {
      m.visible = false; // hide outline and fresnel on ghost
    }
  });

  const { x, z } = boardToWorld(r, f);
  group.position.set(x, 0, z);
  scene.add(group);

  // Fade out over 600ms then remove
  const start = performance.now();
  const dur   = 600;
  (function fade() {
    const t = Math.min(1, (performance.now() - start) / dur);
    ghostMat.opacity = .45 * (1 - t);
    if (t < 1) requestAnimationFrame(fade);
    else scene.remove(group);
  })();
}

// Board input — mobile tap (ignore if finger drifted > 8px = pan gesture)
let touchOriginX = 0, touchOriginY = 0;

canvas.addEventListener('touchstart', e => {
  touchOriginX = e.touches[0].clientX;
  touchOriginY = e.touches[0].clientY;
}, { passive: true });

canvas.addEventListener('touchend', e => {
  const t     = e.changedTouches[0];
  const dx    = t.clientX - touchOriginX;
  const dy    = t.clientY - touchOriginY;
  const drift = Math.sqrt(dx*dx + dy*dy);
  if (drift > 8) return; // was a pan, not a tap
  e.preventDefault(); // block synthetic click
  const sq = getSquareFromPointer(t);
  if (!sq) return;
  if (inSetupMode) handleSetupClick(sq.r, sq.f);
  else handleSquareClick(sq.r, sq.f);
}, { passive: false });

  const tempChess = new Chess();

//  All synthesis via Web Audio API — no files, no CDN.

//  Architecture per track:
//    - Ostinato bass establishes first (Toby Fox approach)
//    - Melody enters after 1 bar intro, 8-bar parallel period
//      (question phrase bars 1–4, answer phrase bars 5–8)
//    - Each melodic unit repeated twice before advancing
//    - Chord pad sustains underneath
//
//  Note representation: absolute Hz using equal temperament A4=440.
//  Each track defines: bpm, bars, chordProg[], bassLine[], melody[].
//  Notes are [hz, beatDuration] pairs. Duration in quarter-note beats.

// ── Equal temperament note table ────────────
// C4 = 261.63 Hz as anchor.
const N = (() => {
  const A4 = 440;
  // Returns Hz for note name + octave, e.g. N('C',4), N('F#',3)
  const NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  return (name, oct) => {
    const idx = NAMES.indexOf(name.replace('b', '#')
      .replace('Db','C#').replace('Eb','D#').replace('Gb','F#')
      .replace('Ab','G#').replace('Bb','A#'));
    const semis = (oct - 4) * 12 + (idx - 9); // offset from A4
    return A4 * Math.pow(2, semis / 12);
  };
})();

      [[N('A',3),N('C',4),N('E',4)], 4],   // i
      [[N('D',3),N('F',3),N('A',3)], 4],   // iv
      [[N('F',3),N('A',3),N('C',4)], 4],   // ♭VI
      [[N('G',3),N('B',3),N('D',4)], 4],   // ♭VII
    ],
    melody: [
      // Question: aggressive, lots of repeated notes then a burst upward
      [N('A',4),.25],[N('A',4),.25],[N('A',5),.5],[N('G',5),.5],[N('F',5),.5],
      [N('E',5),.5],[N('F',5),.5],[N('G',5),.5],[N('E',5),1],
      [N('D',5),.25],[N('D',5),.25],[N('D',5),.5],[N('C',5),.5],[N('D',5),.5],
      [N('E',5),.5],[N('C',5),.5],[N('A',4),1.5],
      // Answer: ramps up higher, classic Undertale "hero theme" feel
      [N('A',4),.25],[N('A',4),.25],[N('A',5),.5],[N('G',5),.5],[N('F',5),.5],
      [N('G',5),.5],[N('A',5),.5],[N('Bb',5),.5],[N('A',5),.5],[N('G',5),.5],
      [N('F',5),.5],[N('E',5),.5],[N('D',5),.5],[N('E',5),.5],[N('F',5),.5],[N('G',5),.5],

];

function getBgmCtx() {
  if (!bgmCtx) bgmCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (bgmCtx.state === 'suspended') bgmCtx.resume();
  return bgmCtx;
}

// Schedule a single BGM note with clean envelope
function bgmNote(ctx, dest, hz, start, dur, type = 'triangle', vol = 0.05) {
  if (!hz || hz <= 0) return; // skip rests (hz=0)
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type            = type;
  osc.frequency.value = hz;
  const att = Math.min(0.015, dur * 0.1);
  const rel = Math.min(0.06, dur * 0.25);
  gain.gain.setValueAtTime(0, start);
  gain.gain.linearRampToValueAtTime(vol, start + att);
  gain.gain.setValueAtTime(vol, start + dur - rel);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + dur);
  osc.connect(gain);
  gain.connect(dest);
  osc.start(start);
  osc.stop(start + dur + 0.01);
  bgmNodes.push(osc);
}

// Schedule and play one full track loop
function playTrack(trackIdx) {
  if (!bgmEnabled) return;
  const ctx   = getBgmCtx();
  const track = BGM_TRACKS[trackIdx % BGM_TRACKS.length];
  const beat  = 60 / track.bpm;
  const swing = track.swing || 0;

  // Swing helper: even 8th notes get pushed, odd 8th notes shortened
  let swingCounter = 0;
  const swungDur = (dur) => {
    // Only applies swing to 0.5-beat notes
    if (dur !== 0.5) { swingCounter = 0; return dur * beat; }
    const s = swingCounter % 2 === 0 ? dur * (1 + swing) : dur * (1 - swing);
    swingCounter++;
    return s * beat;
  };

  // ── Master gain chain ──
  // Low-pass filter takes the edge off bright square waves
  const master  = ctx.createGain();
  const filter  = ctx.createBiquadFilter();
  filter.type            = 'lowpass';
  filter.frequency.value = 3200;
  filter.Q.value         = 0.5;
  master.gain.setValueAtTime(0.22, ctx.currentTime);
  // Fade in gently
  master.gain.linearRampToValueAtTime(0.32, ctx.currentTime + beat * 4);
  master.connect(filter);
  filter.connect(ctx.destination);
  bgmNodes.push(master);

  // ── Bass ostinato ──
  // Plays intro bars before melody enters (Toby Fox intro paradigm)
  const bassBarBeats = track.bass.reduce((s,[,d]) => s + d, 0);
  const bassLoops    = Math.ceil(
    (track.intro * bassBarBeats + track.melody.reduce((s,[,d])=>s+d,0) * 2) / bassBarBeats
  ) + 1;

  let bassT = ctx.currentTime;
  for (let loop = 0; loop < bassLoops; loop++) {
    for (const [hz, dur] of track.bass) {
      bgmNote(ctx, master, hz, bassT, swungDur(dur) * 0.88, track.bassType, 0.06);
      bassT += swungDur(dur);
    }
  }

  // ── Pad chords (start after intro) ──
  let padT = ctx.currentTime + track.intro * bassBarBeats * beat;
  for (let rep = 0; rep < 2; rep++) { // two full repeats of chord progression
    for (const [notes, dur] of track.chords) {
      for (const hz of notes) {
        bgmNote(ctx, master, hz, padT, dur * beat * 0.95, 'sine', 0.022);
      }
      padT += dur * beat;
    }
  }

  // ── Melody (enters after intro, played twice) ──
  let melT = ctx.currentTime + track.intro * bassBarBeats * beat;
  swingCounter = 0;
  for (let rep = 0; rep < 2; rep++) {
    for (const [hz, dur] of track.melody) {
      const d = swungDur(dur);
      bgmNote(ctx, master, hz, melT, d * 0.85, track.lead, 0.05);
      melT += d;
    }
  }

  // ── Schedule next track ──
  const totalDur = Math.max(bassT, melT) - ctx.currentTime;
  bgmTrackTimer = setTimeout(() => {
    stopBgmNodes();
    if (!bgmEnabled) return;
    const next = (trackIdx + 1 + Math.floor(Math.random() * (BGM_TRACKS.length - 1))) % BGM_TRACKS.length;
    bgmTrackIndex = next;
    playTrack(next);
  }, (totalDur + 0.3) * 1000);
}

function stopBgmNodes() {
  clearTimeout(bgmTrackTimer);
  bgmTrackTimer = null;
  bgmNodes.forEach(n => { try { n.stop?.(); n.disconnect?.(); } catch(e) {} });
  bgmNodes = [];
}

function startBgm() {
  stopBgmNodes();
  bgmPlaying    = true;
  bgmTrackIndex = Math.floor(Math.random() * BGM_TRACKS.length);
  playTrack(bgmTrackIndex);
}

function stopBgm() {
  stopBgmNodes();
  bgmPlaying = false;
}

function toggleBgm() {
  bgmEnabled = !bgmEnabled;
  localStorage.setItem('bgm', bgmEnabled ? 'on' : 'off');
  const btn = document.getElementById('btn-music');
  btn.classList.toggle('music-on', bgmEnabled);
  btn.textContent = bgmEnabled ? '♪ Music' : '♩ Music';
  if (bgmEnabled) startBgm(); else stopBgm();
}

function ensureBgmStarted() {
  if (bgmEnabled && !bgmPlaying) startBgm();
}

// Apply initial button state on page load
document.getElementById('btn-music').classList.toggle('music-on', bgmEnabled);
document.getElementById('btn-music').textContent = bgmEnabled ? '♪ Music' : '♩ Music';


// ═══════════════════════════════════════════
//  15. INVITE LINK + URL AUTO-JOIN
//
//  When a room is created, build a shareable URL:
//    https://yoursite.com/?join=ABCD
//  Pasting/clicking this link auto-fills the join panel.
//
//  On page load, check window.location.search for ?join=CODE.
//  If found, pre-fill the join input and open the join panel.
// ═══════════════════════════════════════════

function buildInviteUrl(code) {
  const base = window.location.href.split('?')[0];
  return `${base}?join=${code}`;
}

function updateInviteDisplay(code) {
  const urlEl = document.getElementById('op-invite-url');
  if (urlEl) urlEl.textContent = buildInviteUrl(code);
}

function checkUrlForJoinCode() {
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('join');
  if (!code || code.length !== 4) return;
  // Pre-fill join panel and open it
  const input = document.getElementById('op-code-input');
  if (input) input.value = code.toUpperCase();
  showOnlinePanel('joining');
  setTimeout(() => {
    document.getElementById('op-join-status').textContent = `Code ${code.toUpperCase()} ready — tap Connect`;
    document.getElementById('op-join-status').className   = 'op-status ok';
  }, 100);
}

let animTime = 0;

(function renderLoop() {
  requestAnimationFrame(renderLoop);
  animTime += .012;

  controls.update();

  // Shader + ambient animation
  bgMaterial.uniforms.uT.value = animTime;
  rimLight.intensity   = 3   + Math.sin(animTime * .45) * .5;
  boardGlow.intensity  = 1.8 + Math.sin(animTime * .60) * .4;
  frameMat.emissiveIntensity = 2.2 + Math.sin(animTime * .80) * .4;

  // Per-frame piece animations
  tickParticles();
  tickDust();
  tickKingPulse();
  tickBobAnimation();
  tickSelectionRing();
  tickDotAnimation();

  renderer.render(scene, camera);
})();


// Kick off initial board display
syncBoardToScene(chess);
orientAllKnights();

// Start loading Stockfish in the background (non-blocking)
initStockfish();
